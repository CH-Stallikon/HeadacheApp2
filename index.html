<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0984e3" />

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>HeadacheTrack</title>

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#f4f7f6;
  --card:#ffffff;
  --accent:#0984e3;
  --tension:#e67e22;
  --text:#2d3436;
}

body {
  margin:0;
  font-family:-apple-system,system-ui;
  background:var(--bg);
  color:var(--text);
  padding-bottom:120px;
}

.container {
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

button.active {
  background:var(--accent);
  color:white;
}

.btn-main {
  width:100%;
  background:var(--accent);
  color:white;
  margin-top:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:8px;
}

.tab-bar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab-item {
  flex:1;
  text-align:center;
  padding:15px;
  font-weight:bold;
  opacity:.5;
}

.tab-item.active {
  opacity:1;
  color:var(--accent);
}

.page { display:none; }
.page.active { display:block; }

.toast {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  font-size:14px;
  opacity:0;
  transition:.3s;
}

.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">

<!-- LOG PAGE -->
<div id="logPage" class="page active">
<h1>Log Headache</h1>
<div class="card">

<h3>Type</h3>
<div class="grid" id="typeGrid">
<button data-type="Migraine">Migraine</button>
<button data-type="Tension">Tension</button>
</div>

<h3>Severity</h3>
<div class="grid" id="sevGrid">
<button data-sev="1">1</button>
<button data-sev="2">2</button>
<button data-sev="3">3</button>
<button data-sev="4">4</button>
<button data-sev="5">5</button>
</div>

<h3>Medication</h3>
<div class="grid" id="medGrid">
<button data-med="Zomig">Zomig</button>
<button data-med="Solpadeine">Solpadeine</button>
<button data-med="Paracetamol">Paracetamol</button>
<button data-med="None">None</button>
</div>

<button class="btn-main" id="saveBtn">Save</button>
<button class="btn-main" id="exportBtn">Export JSON</button>
<input type="file" id="importInput" hidden>
<button class="btn-main" id="importBtn">Import JSON</button>

</div>
</div>

<!-- REPORT PAGE -->
<div id="reportPage" class="page">
<h1>Analysis</h1>
<div class="card">
<canvas id="timelineChart"></canvas>
</div>
</div>

</div>

<nav class="tab-bar">
<div class="tab-item active" data-nav="logPage">Log</div>
<div class="tab-item" data-nav="reportPage">Report</div>
</nav>

<script>
/* DATABASE */
const db = new Dexie("HeadacheTrackDB");
db.version(1).stores({
  logs: "++id, dateISO, type, sev"
});

/* STATE */
let entry = { type:null, sev:null, med:[] };
let charts = {};

/* UTIL */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function todayISO(){
  return new Date().toISOString();
}

/* TYPE */
document.querySelectorAll("#typeGrid button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    entry.type=btn.dataset.type;
    document.querySelectorAll("#typeGrid button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

/* SEVERITY */
document.querySelectorAll("#sevGrid button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    entry.sev=parseInt(btn.dataset.sev);
    document.querySelectorAll("#sevGrid button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

/* MEDICATION */
document.querySelectorAll("#medGrid button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const val=btn.dataset.med;

    if(val==="None"){
      entry.med=["None"];
      document.querySelectorAll("#medGrid button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      return;
    }

    entry.med=entry.med.filter(m=>m!=="None");
    document.querySelector("#medGrid button[data-med='None']").classList.remove("active");

    if(entry.med.includes(val)){
      entry.med=entry.med.filter(m=>m!==val);
      btn.classList.remove("active");
    }else{
      entry.med.push(val);
      btn.classList.add("active");
    }
  });
});

/* SAVE */
document.getElementById("saveBtn").addEventListener("click",async()=>{
  if(!entry.type || !entry.sev){
    showToast("Select type and severity");
    return;
  }

  try{
    await db.logs.add({
      dateISO: todayISO(),
      type: entry.type,
      sev: entry.sev,
      med: entry.med.length?entry.med:["None"],
      createdAt: todayISO()
    });

    showToast("Saved");

    entry={ type:null, sev:null, med:[] };
    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

    await renderChart();

  }catch(e){
    console.error(e);
    showToast("Database error");
  }
});

/* EXPORT */
document.getElementById("exportBtn").addEventListener("click",async()=>{
  const data=await db.logs.toArray();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="headache-backup.json";
  a.click();
  URL.revokeObjectURL(url);
});

/* IMPORT */
document.getElementById("importBtn").addEventListener("click",()=>{
  document.getElementById("importInput").click();
});

document.getElementById("importInput").addEventListener("change",async(e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const text=await file.text();
  const json=JSON.parse(text);
  await db.logs.bulkAdd(json);
  showToast("Imported");
  await renderChart();
});

/* NAV */
document.querySelectorAll(".tab-item").forEach(tab=>{
  tab.addEventListener("click",async()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));

    document.getElementById(tab.dataset.nav).classList.add("active");
    tab.classList.add("active");

    if(tab.dataset.nav==="reportPage"){
      await renderChart();
    }
  });
});

/* CHART */
async function renderChart(){
  const logs = await db.logs.orderBy("dateISO").toArray();

  if (!logs.length) {
    if (charts.timeline) {
      charts.timeline.destroy();
      charts.timeline = null;
    }
    return;
  }

  const grouped = {};

  logs.forEach(l=>{
    const day=l.dateISO.split("T")[0];
    if(!grouped[day]) grouped[day]=[];
    grouped[day].push(l);
  });

  const labels=Object.keys(grouped).sort();

  const data=labels.map(day=>{
    const entries=grouped[day];
    const total=entries.reduce((sum,e)=>sum+e.sev,0);
    return total/entries.length;
  });

  const ctx=document.getElementById("timelineChart").getContext("2d");

  if(charts.timeline){
    charts.timeline.destroy();
    charts.timeline=null;
  }

  await new Promise(r=>setTimeout(r,50));

  charts.timeline=new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Avg Severity",
        data,
        borderColor:"#0984e3",
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      animation:false,
      scales:{ y:{ min:0,max:5 } }
    }
  });
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
